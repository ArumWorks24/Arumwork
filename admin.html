<html lang="en-IN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="robots" content="NOINDEX, NOFOLLOW">
<meta name="theme-color" content="#0a0a0c">

<!-- SEO Meta Tags -->
<title>ArumWorks Admin Panel - Order Management</title>
<meta name="description" content="ARUM Admin Panel - Manage orders, track status, upload completed work.">
<meta name="author" content="ARUM">
<meta name="language" content="English">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;
background:#0a0a0c;
color:#f5f5f7;
min-height:100vh;
}

/* HEADER */
.header{
background:linear-gradient(135deg,#1c1c1e 0%,#2c2c2e 100%);
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #2c2c2e;
box-shadow:0 4px 20px rgba(0,0,0,0.3);
}

.logo{
font-size:24px;
font-weight:600;
color:#fff;
display:flex;
align-items:center;
gap:12px;
}

.logo span{
color:#0071e3;
}

.header-actions{
display:flex;
gap:12px;
align-items:center;
}

/* BUTTONS */
.btn{
padding:10px 20px;
border:none;
cursor:pointer;
border-radius:10px;
font-size:14px;
font-weight:500;
transition:all 0.2s;
display:flex;
align-items:center;
gap:8px;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

.btn-primary{
background:linear-gradient(135deg,#0071e3 0%,#0057b3 100%);
color:white;
}

.btn-secondary{
background:#2c2c2e;
color:#d1d1d6;
border:1px solid #3c3c3e;
}

.btn-logout{
background:linear-gradient(135deg,#ff3b30 0%,#cc2f28 100%);
color:white;
}

/* STATS */
.stats-container{
display:flex;
gap:20px;
padding:30px 40px;
flex-wrap:wrap;
}

.stat-card{
background:linear-gradient(135deg,#1c1c1e 0%,#2c2c2e 100%);
padding:24px 32px;
border-radius:16px;
min-width:200px;
flex:1;
box-shadow:0 8px 25px rgba(0,0,0,0.3);
border:1px solid #2c2c2e;
transition:0.3s;
}

.stat-card:hover{
transform:translateY(-5px);
border-color:#0071e3;
}

.stat-card h3{
font-size:14px;
color:#8e8e93;
font-weight:500;
margin-bottom:8px;
text-transform:uppercase;
letter-spacing:1px;
}

.stat-card .number{
font-size:36px;
font-weight:700;
color:#fff;
}

.stat-card.pending .number{color:#ff9f0a;}
.stat-card.approved .number{color:#34c759;}
.stat-card.completed .number{color:#0071e3;}
.stat-card.cancelled .number{color:#ff3b30;}

/* MAIN CONTENT */
.main-content{
padding:0 40px 40px;
}

/* TABLE CONTAINER */
.table-container{
background:#1c1c1e;
border-radius:16px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,0.4);
border:1px solid #2c2c2e;
}

.table-header{
padding:24px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #2c2c2e;
background:linear-gradient(135deg,#1c1c1e 0%,#252527 100%);
}

.table-header h2{
font-size:18px;
font-weight:600;
color:#fff;
}

.search-box{
display:flex;
gap:10px;
}

.search-box input{
padding:10px 16px;
border-radius:10px;
border:1px solid #3c3c3e;
background:#2c2c2e;
color:white;
font-size:14px;
width:250px;
outline:none;
transition:0.2s;
}

.search-box input:focus{
border-color:#0071e3;
box-shadow:0 0 10px rgba(0,113,227,0.2);
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

thead{
background:#2c2c2e;
}

th{
padding:16px;
text-align:left;
font-weight:600;
color:#8e8e93;
font-size:13px;
text-transform:uppercase;
letter-spacing:0.5px;
border-bottom:1px solid #3c3c3e;
}

td{
padding:16px;
border-bottom:1px solid #2c2c2e;
font-size:14px;
color:#d1d1d6;
}

tbody tr{
transition:0.2s;
}

tbody tr:hover{
background:#252527;
}

/* STATUS BADGES */
.status-badge{
padding:6px 14px;
border-radius:20px;
font-size:12px;
font-weight:600;
text-transform:uppercase;
display:inline-block;
}

.status-pending{background:rgba(255,159,10,0.2);color:#ff9f0a;}
.status-approved{background:rgba(52,199,89,0.2);color:#34c759;}
.status-completed{background:rgba(0,113,227,0.2);color:#0071e3;}
.status-cancelled{background:rgba(255,59,48,0.2);color:#ff3b30;}

/* ACTION BUTTONS */
.action-btns{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.action-btn{
padding:8px 14px;
border:none;
cursor:pointer;
border-radius:8px;
font-size:12px;
font-weight:600;
transition:all 0.2s;
}

.action-btn:hover{
transform:scale(1.05);
}

.btn-approve{
background:rgba(52,199,89,0.2);
color:#34c759;
}

.btn-approve:hover{background:#34c759;color:white;}

.btn-cancel{
background:rgba(255,59,48,0.2);
color:#ff3b30;
}

.btn-cancel:hover{background:#ff3b30;color:white;}

.btn-complete{
background:rgba(255,159,10,0.2);
color:#ff9f0a;
}

.btn-complete:hover{background:#ff9f0a;color:black;}

.btn-delete{
background:rgba(255,59,48,0.15);
color:#ff3b30;
}

.btn-delete:hover{background:#ff3b30;color:white;}

/* EMPTY STATE */
.empty-state{
padding:60px;
text-align:center;
color:#8e8e93;
}

.empty-state svg{
width:80px;
height:80px;
margin-bottom:20px;
opacity:0.5;
}

/* LOADING */
.loading{
display:flex;
justify-content:center;
align-items:center;
padding:60px;
}

.spinner{
width:40px;
height:40px;
border:3px solid #2c2c2e;
border-top-color:#0071e3;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

/* LOGIN BOX */
.loginBox{
margin-top:80px;
background:linear-gradient(135deg,#1c1c1e 0%,#2c2c2e 100%);
padding:50px;
width:400px;
margin-left:auto;
margin-right:auto;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.5);
border:1px solid #2c2c2e;
}

.loginBox h2{
text-align:center;
margin-bottom:30px;
font-size:28px;
}

.loginBox input{
padding:14px;
margin:10px;
width:100%;
border-radius:10px;
border:1px solid #3c3c3e;
background:#2c2c2e;
color:white;
font-size:15px;
outline:none;
box-sizing:border-box;
}

.loginBox input:focus{
border-color:#0071e3;
box-shadow:0 0 15px rgba(0,113,227,0.3);
}

.loginBox button{
width:100%;
padding:14px;
margin-top:20px;
background:linear-gradient(135deg,#0071e3 0%,#0057b3 100%);
color:white;
border:none;
border-radius:10px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

.loginBox button:hover{
transform:translateY(-2px);
box-shadow:0 8px 25px rgba(0,113,227,0.4);
}

/* RESPONSIVE */
@media(max-width:900px){
.header{flex-direction:column;gap:15px;padding:20px;}
.stats-container{padding:20px;}
.main-content{padding:0 20px 20px;}
.table-header{flex-direction:column;gap:15px;}
.search-box{width:100%;}
.search-box input{width:100%;}
/* Table Horizontal Scroll */
.table-container{overflow-x:auto;-webkit-overflow-scrolling:touch;}
}

@media(max-width:600px){
.header{padding:15px;}
.logo{font-size:20px;}
.stats-container{padding:15px;gap:12px;}
.stat-card{padding:16px;min-width:140px;}
.stat-card .number{font-size:28px;}
.main-content{padding:0 12px 12px;}
.table-container{border-radius:12px;}
.table-header{padding:16px;}
.table-header h2{font-size:16px;}
.search-box input{padding:8px 12px;font-size:13px;}
th,td{padding:12px;font-size:12px;}
.action-btns{flex-direction:column;gap:6px;}
.action-btn{padding:6px 10px;font-size:11px;width:100%;}
.status-badge{padding:4px 8px;font-size:10px;}
.loginBox{width:90%;padding:30px 20px;margin-top:60px;}
.loginBox h2{font-size:22px;}
.loginBox input{padding:12px;font-size:14px;}
.loginBox button{padding:12px;font-size:14px;}
}

</style>

</head>

<body>

<input id="email" placeholder="Admin Email"><br>

</div>


<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none">

<!-- HEADER -->
<header class="header">
<div class="logo">
<span>⚡</span> ArumWorks Admin
</div>
<div class="header-actions">
<button class="btn btn-primary" onclick="loadOrders()">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M23 4v6h-6M1 20v-6h6"/>

<polyline points="16,17 21,12 16,7"/>

</header>

<!-- STATS -->
<div class="stats-container">
<div class="stat-card pending">
<h3>Pending</h3>
<div class="number" id="pendingCount">0</div>
</div>
<div class="stat-card approved">
<h3>Approved</h3>
<div class="number" id="approvedCount">0</div>
</div>
<div class="stat-card completed">
<h3>Completed</h3>
<div class="number" id="completedCount">0</div>
</div>

<div class="number" id="cancelledCount">0</div>
</div>
</div>

<!-- ADMIN TABS -->
<div class="admin-tabs">
<button class="admin-tab active" onclick="switchAdminTab('orders')">📋 Orders</button>
<button class="admin-tab" onclick="switchAdminTab('feedback')">💬 Feedback</button>
</div>

<!-- ORDERS SECTION -->
<div class="admin-section active" id="ordersSection">
<div class="main-content">
<div class="table-container">
<div class="table-header">
<h2>📋 All Orders</h2>
<div class="search-box">
<input type="text" id="searchInput" placeholder="Search orders..." oninput="filterOrders()">
</div>
</div>

<table>
<thead>
<tr>
<th>Customer</th>
<th>Phone</th>
<th>Email</th>
<th>Service</th>
<th>Description</th>
<th>Details</th>
<th>Note</th>
<th>Files</th>
<th>Payment Proof</th>
<th>Transaction ID</th>
<th>Price</th>
<th>Status</th>
<th>Actions</th>
</tr>

<!-- FEEDBACK SECTION -->

<div class="main-content">
<div class="table-container">
<div class="table-header">
<h2>💬 Customer Feedback</h2>
<button class="btn btn-primary" onclick="loadFeedback()">🔄 Refresh</button>
</div>
<div id="feedbackGrid" style="padding: 20px;">
<div class="loading"><div class="spinner"></div></div>
</div>
</div>
</div>

</div>

<!-- VIEW DESCRIPTION MODAL -->
<div id="viewDescModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;">
<div style="background:#1c1c1e;padding:30px;border-radius:16px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto;border:1px solid #3c3c3e;">
<h3 style="margin-bottom:20px;color:#fff;">📝 Order Description</h3>
<p id="viewDescContent" style="color:#d1d1d6;line-height:1.6;word-wrap:break-word;"></p>
<button onclick="closeViewDescModal()" style="margin-top:20px;padding:12px 24px;background:#0071e3;color:white;border:none;border-radius:8px;cursor:pointer;">Close</button>
</div>
</div>

<!-- VIEW NOTE MODAL -->
<div id="viewNoteModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;">
<div style="background:#1c1c1e;padding:30px;border-radius:16px;max-width:500px;width:90%;border:1px solid #3c3c3e;">
<h3 style="margin-bottom:20px;color:#fff;">📝 Admin Note</h3>
<p id="viewNoteContent" style="color:#d1d1d6;line-height:1.6;margin-bottom:20px;"></p>
<textarea id="noteInput" placeholder="Add a note for this order..." style="width:100%;padding:12px;border-radius:8px;background:#2c2c2e;color:#fff;border:1px solid #3c3c3e;min-height:100px;resize:vertical;"></textarea>
<div style="display:flex;gap:10px;margin-top:15px;">
<button onclick="saveNote()" style="padding:12px 24px;background:#34c759;color:white;border:none;border-radius:8px;cursor:pointer;">Save Note</button>
<button onclick="closeViewNoteModal()" style="padding:12px 24px;background:#2c2c2e;color:#fff;border:1px solid #3c3c3e;border-radius:8px;cursor:pointer;">Cancel</button>
</div>
</div>
</div>

<!-- VIEW PROJECT SUMMARY MODAL -->
<div id="viewProjectSummaryModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;">
<div style="background:#1c1c1e;padding:30px;border-radius:16px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto;border:1px solid #9333ea;">
<h3 style="margin-bottom:20px;color:#fff;">📋 Project Summary</h3>
<p id="viewProjectSummaryContent" style="color:#d1d1d6;line-height:1.6;word-wrap:break-word;white-space:pre-wrap;"></p>
<button onclick="closeViewProjectSummaryModal()" style="margin-top:20px;padding:12px 24px;background:#9333ea;color:white;border:none;border-radius:8px;cursor:pointer;">Close</button>
</div>
</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
updateDoc,
doc,
deleteDoc,
query,
where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Supabase Config
const supabaseUrl = 'https://fmbnplpuitedqlvkddke.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZtYm5wbHB1aXRlZHFsdmtkZGtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2ODY4NzQsImV4cCI6MjA4ODI2Mjg3NH0.WDZECVMRqfovCyuiGjyw4F_zttakJZrepYxpLNIslmg';

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

const firebaseConfig = {
apiKey: "AIzaSyAFCg26gXr-5vkCAp6b_XtXgbN8cvS8q2g",
authDomain: "arum-work.firebaseapp.com",
projectId: "arum-work",
storageBucket: "arum-work.firebasestorage.app",
messagingSenderId: "449287443075",
appId: "1:449287443075:web:e16ccfb509902010bd81b6"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allOrders = [];

/* =====================
ADMIN LOGIN
===================== */

window.login = async function(){

const email = document.getElementById("email").value.trim();
const pass = document.getElementById("password").value.trim();

if(!email || !pass){
alert("Please enter email and password");
return;
}

const snapshot = await getDocs(collection(db,"Users"));

let loginSuccess=false;

snapshot.forEach((docSnap)=>{
const data = docSnap.data();
if(data.user === email && data.Pass === pass){
loginSuccess=true;
}
});

if(loginSuccess){
document.getElementById("loginPage").style.display="none";
document.getElementById("adminPanel").style.display="block";
loadOrders();
}else{
alert("Invalid credentials");
}
};


/* =====================
LOGOUT
===================== */

window.logout = function(){
document.getElementById("loginPage").style.display="block";
document.getElementById("adminPanel").style.display="none";
document.getElementById("email").value="";
document.getElementById("password").value="";
};


/* =====================
LOAD ORDERS
===================== */

window.loadOrders = async function(){

const table=document.getElementById("ordersTable");
table.innerHTML=`<tr><td colspan="7" class="loading"><div class="spinner"></div></td></tr>`;

const querySnapshot = await getDocs(collection(db,"orders"));

allOrders = [];
querySnapshot.forEach((docSnap)=>{
allOrders.push({id: docSnap.id, ...docSnap.data()});
});

updateStats();
renderOrders(allOrders);
};


/* =====================
RENDER ORDERS
===================== */

function renderOrders(orders){
const table=document.getElementById("ordersTable");

if(orders.length === 0){
table.innerHTML=`
<tr>
<td colspan="8" class="empty-state">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
<path d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
</svg>
<p>No orders found</p>
</td>
</tr>
`;
return;
}

table.innerHTML="";

let currentNoteOrderId = null;

orders.forEach((order)=>{
const row=document.createElement("tr");
const statusClass = "status-" + (order.status || "pending");

// Description column - show truncated or View button
let descHtml = '';
if(order.description && order.description.length > 50){
    descHtml = `<button class="action-btn" style="background:rgba(0,113,227,0.2);color:#0071e3;" onclick="viewDescription('${order.id}')">View Description</button>`;
}else{
    descHtml = order.description || '<span style="color:#8e8e93;">-</span>';
}

// Details column - show View Details button for Project Summary
let detailsHtml = '';
if(order.projectSummary && order.projectSummary.length > 0){
    detailsHtml = `<button class="action-btn" style="background:rgba(147,51,234,0.2);color:#9333ea;" onclick="viewProjectSummary('${order.id}')">📋 View Details</button>`;
}else{
    detailsHtml = '<span style="color:#8e8e93;">No summary</span>';
}

// Note column - show View Note button
let noteHtml = '';
if(order.adminNote){
    noteHtml = `<button class="action-btn" style="background:rgba(255,159,10,0.2);color:#ff9f0a;" onclick="viewNote('${order.id}')">View Note</button>`;
}else{
    noteHtml = `<button class="action-btn" style="background:rgba(142,142,147,0.2);color:#8e8e93;" onclick="viewNote('${order.id}')">Add Note</button>`;
}

// Files column - show links if files exist
let filesHtml = '';
if(order.fileUrls && order.fileUrls.length > 0){
    filesHtml = order.fileUrls.map(url => 
        `<a href="${url}" target="_blank" style="color:#0071e3;display:block;margin-bottom:4px;">📎 View File</a>`
    ).join('');
}else{
    filesHtml = '<span style="color:#8e8e93;">No files</span>';
}

// Payment Proof column - show screenshot if exists
let paymentProofHtml = '';
if(order.paymentScreenshot){
    paymentProofHtml = `<a href="${order.paymentScreenshot}" target="_blank" style="color:#34c759;display:block;margin-bottom:4px;">📸 View Screenshot</a>`;
}else{
    paymentProofHtml = '<span style="color:#8e8e93;">Not uploaded</span>';
}

// Transaction ID column
let transactionIdHtml = '';
if(order.transactionId){
    transactionIdHtml = `<span style="color:#34c759;font-weight:600;">${order.transactionId}</span>`;
}else{
    transactionIdHtml = '<span style="color:#8e8e93;">-</span>';
}

row.innerHTML=`

<td><strong>${order.firstName || ""} ${order.lastName || ""}</strong></td>

<td>${order.phone || ""}</td>

<td>${order.userEmail || "<span style='color:#8e8e93'>Not logged in</span>"}</td>

<td>${order.service || ""}</td>

<td>${descHtml}</td>

<td>${detailsHtml}</td>

<td>${noteHtml}</td>

<td>${filesHtml}</td>

<td>${paymentProofHtml}</td>

<td>${transactionIdHtml}</td>

<td>₹${order.price || "0"}</td>

<td><span class="status-badge ${statusClass}">${order.status || "pending"}</span></td>

<td>
<div class="action-btns">
<button class="action-btn btn-approve" onclick="updateStatus('${order.id}','approved')">Approve</button>
<button class="action-btn btn-complete" onclick="updateStatus('${order.id}','completed')">Done</button>
<button class="action-btn" style="background:rgba(0,113,227,0.2);color:#0071e3;" onclick="uploadCompletedWork('${order.id}')">📎 Upload Work</button>
<button class="action-btn btn-cancel" onclick="updateStatus('${order.id}','cancelled')">Cancel</button>
<button class="action-btn btn-delete" onclick="deleteOrder('${order.id}')">Delete</button>
</div>
</td>

`;

table.appendChild(row);
});
}


/* =====================
UPDATE STATS
===================== */

function updateStats(){
const pending = allOrders.filter(o => (o.status || "pending") === "pending").length;
const approved = allOrders.filter(o => o.status === "approved").length;
const completed = allOrders.filter(o => o.status === "completed").length;
const cancelled = allOrders.filter(o => o.status === "cancelled").length;

document.getElementById("pendingCount").textContent = pending;
document.getElementById("approvedCount").textContent = approved;
document.getElementById("completedCount").textContent = completed;
document.getElementById("cancelledCount").textContent = cancelled;
}


/* =====================
FILTER ORDERS
===================== */

window.filterOrders = function(){
const search = document.getElementById("searchInput").value.toLowerCase();

const filtered = allOrders.filter(order => {
const name = (order.firstName + " " + order.lastName).toLowerCase();
const phone = (order.phone || "").toLowerCase();
const service = (order.service || "").toLowerCase();
const description = (order.description || "").toLowerCase();
const status = (order.status || "pending").toLowerCase();

return name.includes(search) || phone.includes(search) || service.includes(search) || description.includes(search) || status.includes(search);
});

renderOrders(filtered);
};


/* =====================
UPLOAD COMPLETED WORK FILE
===================== */

window.uploadCompletedWork = async function(orderId) {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '*/*';
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        try {
            // Upload to Supabase - using 'files' bucket (completed-work bucket doesn't exist)
            const fileName = 'completed_' + Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9.]/g, '_');
            
            const { data, error } = await supabase.storage
                .from('files')
                .upload(fileName, file);
                
            if (error) {
                console.error('Upload error:', error);
                alert('Upload failed: ' + error.message);
                return;
            }
            
            // Get public URL - using 'files' bucket
            const { data: urlData } = supabase.storage
                .from('files')
                .getPublicUrl(fileName);
            
            const fileUrl = urlData.publicUrl;
            console.log('File uploaded:', fileUrl);
            
            // Now update the order with the completed work file
            await addCompletedWorkFile(orderId, fileUrl, file.name);
            
        } catch (error) {
            console.error('Error:', error);
            alert('Upload error');
        }
    };
    input.click();
};

async function addCompletedWorkFile(orderId, fileUrl, fileName) {
    try {
        // Find the document
        const querySnapshot = await getDocs(query(collection(db,"orders"), where("id", "==", orderId)));
        
        if(querySnapshot.empty){
            alert("Order not found");
            return;
        }
        
        const docSnap = querySnapshot.docs[0];
        const docId = docSnap.id;
        const currentData = docSnap.data();
        
        // Get existing completed files or create new array
        const completedFiles = currentData.completedFiles || [];
        completedFiles.push({
            url: fileUrl,
            name: fileName,
            uploadedAt: new Date().toISOString()
        });
        
        const ref = doc(db,"orders",docId);
        await updateDoc(ref, {
            completedFiles: completedFiles,
            completedDate: new Date().toLocaleDateString()
        });
        
        alert('Work file uploaded successfully!');
        loadOrders();
        
    } catch (error) {
        console.error('Error adding file:', error);
        alert('Error uploading file');
    }
}

/* =====================
UPDATE STATUS
===================== */

window.updateStatus = async function(orderId,status){
try{
console.log("Updating order:", orderId, "to status:", status);

// Find the document by querying with the orderId field
const querySnapshot = await getDocs(query(collection(db,"orders"), where("id", "==", orderId)));

if(querySnapshot.empty){
console.error("No document found with orderId:", orderId);
alert("Order not found in database");
return;
}

// Get the first matching document
const docSnap = querySnapshot.docs[0];
const docId = docSnap.id;

console.log("Found document ID:", docId);

const ref = doc(db,"orders",docId);
await updateDoc(ref,{status: status, completedDate: new Date().toLocaleDateString()});
loadOrders();
alert("Status updated to " + status);

// If marking as completed, ask if they want to upload work files
if (status === 'completed') {
    const uploadWork = confirm('Order marked as completed! Do you want to upload the completed work files now?');
    if (uploadWork) {
        window.uploadCompletedWork(orderId);
    }
}
}catch(error){
console.error("Error updating status:", error);
alert("Error updating status: " + error.message);
}
};


/* =====================
DELETE ORDER
===================== */

window.deleteOrder = async function(orderId){
const confirmDelete = confirm("Delete this order?");
if(!confirmDelete) return;

try{
console.log("Deleting order:", orderId);

// Find the document by querying with the orderId field
const querySnapshot = await getDocs(query(collection(db,"orders"), where("id", "==", orderId)));

if(querySnapshot.empty){
console.error("No document found with orderId:", orderId);
alert("Order not found in database");
return;
}

// Get the first matching document
const docSnap = querySnapshot.docs[0];
const docId = docSnap.id;

console.log("Found document ID to delete:", docId);

const ref = doc(db,"orders",docId);
await deleteDoc(ref);
loadOrders();
alert("Order deleted");
}catch(error){
console.error("Error deleting order:", error);

}
};

/* =====================

===================== */

window.saveNote = async function(){
if(!currentNoteOrderId) return;
const noteContent = document.getElementById('noteInput').value.trim();
if(!noteContent){
alert('Please enter a note');
return;
}
try{
const querySnapshot = await getDocs(query(collection(db,"orders"), where("id", "==", currentNoteOrderId)));
if(querySnapshot.empty){
alert("Order not found");
return;
}
const docSnap = querySnapshot.docs[0];
const docId = docSnap.id;
const ref = doc(db,"orders",docId);
await updateDoc(ref, { adminNote: noteContent });
alert('Note saved successfully!');
closeViewNoteModal();
loadOrders();
}catch(error){
console.error('Error saving note:', error);
alert('Error saving note');
}
};

/* =====================
SWITCH ADMIN TAB
===================== */

window.switchAdminTab = function(tab) {
    // Update tab buttons
    document.querySelectorAll('.admin-tab').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    
    // Update sections
    document.querySelectorAll('.admin-section').forEach(section => section.classList.remove('active'));
    
    if (tab === 'orders') {
        document.getElementById('ordersSection').classList.add('active');
    } else if (tab === 'feedback') {
        document.getElementById('feedbackSection').classList.add('active');
        loadFeedback();
    }
};

/* =====================
LOAD FEEDBACK
===================== */

window.loadFeedback = async function() {
    const grid = document.getElementById('feedbackGrid');
    grid.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    
    try {
        const querySnapshot = await getDocs(collection(db, "feedback"));
        const feedbackList = [];
        querySnapshot.forEach((docSnap) => {
            feedbackList.push({ id: docSnap.id, ...docSnap.data() });
        });
        
        // Sort by date descending
        feedbackList.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        
        if (feedbackList.length === 0) {
            grid.innerHTML = '<div class="empty-state"><p>No feedback yet</p></div>';
            return;
        }
        
        grid.innerHTML = feedbackList.map(fb => {
            const stars = '★'.repeat(fb.rating || 0) + '☆'.repeat(5 - (fb.rating || 0));
            return `
                <div class="feedback-card">
                    <div class="feedback-header">
                        <span class="feedback-name">${fb.name || 'Anonymous'}</span>
                        <span class="feedback-date">${fb.date || ''}</span>
                    </div>
                    <div class="feedback-rating">${stars}</div>
                    <div class="feedback-message">${fb.message || ''}</div>
                    ${fb.userEmail ? `<div class="feedback-email">📧 ${fb.userEmail}</div>` : ''}
                </div>
            `;
        }).join('');
        
    } catch (error) {
        console.error('Error loading feedback:', error);
        grid.innerHTML = '<div class="empty-state"><p>Error loading feedback</p></div>';
    }
};
